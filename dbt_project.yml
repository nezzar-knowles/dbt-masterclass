name: 'dbt_masterclass_thelook'
version: '1.0.0'
config-version: 2

# This must match the connection name you set up in dbt Cloud's project settings.
profile: 'dbt_masterclass_thelook'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

# ---------------------------------------------------------------------------
# MODULE 1 — PROJECT STRUCTURE & BEST PRACTICES
#
# Three layers, each materialized differently and built into its own
# BigQuery dataset (dbt appends these as suffixes to your dev/target dataset,
# e.g. dbt_ebenezer_staging, dbt_ebenezer_intermediate, dbt_ebenezer_marts).
#
#   staging      -> 1:1 with a source table, light cleanup only, materialized
#                   as a view (cheap, always reflects latest source data)
#   intermediate -> reusable building-block logic shared across marts,
#                   materialized as a view (not meant to be queried by BI tools)
#   marts        -> final, business-facing models, materialized as tables
#                   (most expensive to build, cheapest to query repeatedly)
#
# Naming convention used throughout this project:
#   stg_<source>__<entity>      e.g. stg_thelook__orders
#   int_<entity>__<verb>        e.g. int_orders__joined_items
#   fct_<entity> / dim_<entity> e.g. fct_orders, dim_customers
# ---------------------------------------------------------------------------
models:
  dbt_masterclass_thelook:
    staging:
      +materialized: view
      +schema: staging
    intermediate:
      +materialized: view
      +schema: intermediate
      +group: intermediate
    marts:
      +materialized: table
      +schema: marts
      core:
        fct_order_items_incremental:
          # Materialization is set directly in the model config block --
          # this entry exists only to make the override visible in one
          # place rather than relying entirely on the in-file config().
          +materialized: incremental

seeds:
  dbt_masterclass_thelook:
    holiday_calendar:
      +column_types:
        holiday_date: date
        is_major_shopping_holiday: boolean
    product_category_target_margin:
      +column_types:
        target_margin_pct: float64
