# dbt Cloud — Production Deploy Job Reference
# Module 5: Orchestration & CI/CD
#
# This is a reference document, not an executable config file.
# dbt Cloud jobs are configured in the UI under Deploy > Jobs.
# Use this as the exact settings checklist so you can configure
# the job live in class without fumbling through the interface.

# =============================================================
# JOB 1: Daily Production Run
# =============================================================

name: "thelook_masterclass — Daily Production Run"
environment: Production          # NOT Development — use a separate env
dbt_version: Latest (or pin to current)
target_name: prod

# Run steps — ORDER MATTERS
run_steps:
  - dbt deps                     # Always first — installs dbt_utils
  - dbt seed                     # Seeds before models (models may ref seeds)
  - dbt snapshot                 # Snapshots before models (models ref snapshots)
  - dbt run                      # Full project run
  - dbt test                     # All tests — generic, singular, and unit
  - dbt source freshness         # Freshness check after everything else runs
  - dbt docs generate            # Publish updated docs on every run

# Triggers
schedule:
  cron: "0 5 * * *"             # 5:00 AM UTC daily
  # Tip for class: ask students what timezone 5 AM UTC is for a
  # business in Lagos (UTC+1 → 6 AM WAT). A common real-world
  # mistake is setting jobs in UTC without thinking about when
  # the team will actually see the results.

# Notifications
on_failure:
  slack_webhook: true            # Configure under Account Settings > Integrations
  email:
    - your_email@domain.com

# What to discuss with students:
# 1. dbt deps runs every time — this feels wasteful but ensures packages
#    stay at the pinned version even if the dbt_packages/ folder was
#    cleared. You can cache packages in dbt Cloud to speed this up.
# 2. dbt source freshness runs LAST, not first — it checks whether data
#    is fresh as of the moment the run completes, not before. If you run
#    it first, it passes based on yesterday's data, not today's.
# 3. dbt docs generate in a job publishes docs automatically. Without this,
#    docs only update when someone runs it manually from the IDE.
# 4. On a live dataset like thelook_ecommerce, you'll see row counts
#    change between runs — a good moment to show the job history tab
#    and compare run times across days.

# =============================================================
# JOB 2: Slim CI — Pull Request Check
# =============================================================

name: "thelook_masterclass — Slim CI (PR Check)"
environment: Development         # CI runs in dev, NOT prod
trigger: Pull Request            # Enable under job settings → Triggers → PR

run_steps:
  - dbt deps
  - dbt build
    --select state:modified+     # Only models changed on this branch + their downstream
    --defer                      # Use prod manifest for unmodified models (so ref() works
                                 # without building the entire project from scratch)
    --state ./prod-artifacts     # Path where the production manifest.json is stored
                                 # In dbt Cloud: this is auto-populated from the
                                 # "Defer to" job setting — point it at the Daily
                                 # Production Run job above

# What to discuss with students:
# 1. state:modified+ selects the changed model PLUS its downstream
#    dependents. The + means "and everything downstream of this."
#    Without +, you'd only test the changed model itself and miss
#    breakage in models that depend on it.
# 2. --defer means "for any model NOT in state:modified+, use the
#    production version instead of rebuilding it." This is what makes
#    ref() work across branches without building the whole project.
# 3. `dbt build` runs run + test together in dependency order, so
#    a model's tests run right after that model builds — not all at
#    the end. Faster feedback on failures.
# 4. The CI job BLOCKS the PR merge in GitHub if it fails. Show
#    students the GitHub PR page after a failure — the merge button
#    goes grey. This is the whole point.

# =============================================================
# ENVIRONMENT SETUP (do this before configuring jobs)
# =============================================================

# Development environment
environment:
  name: Development
  dbt_version: Latest
  dataset: dbt_{{ var('user_name', 'dev') }}   # e.g. dbt_ebenezer
  credentials: each developer's personal service account

# Production environment
environment:
  name: Production
  dbt_version: Latest (pin after testing)
  dataset: dbt_masterclass_prod
  credentials: a SHARED service account (not any individual's personal one)

# Why separate credentials for prod:
# If a developer's personal service account key expires or is revoked,
# only their dev environment breaks — production keeps running.
# This is a very common real-world mistake to preempt.
