version: 2

sources:
  - name: thelook_ecommerce
    database: bigquery-public-data   # Google's project — read-only, you don't own this
    schema: thelook_ecommerce
    description: >
      Synthetic e-commerce dataset (Looker/Google public datasets program).
      Read-only — never written to by this project. Confirmed live and
      actively maintained (most tables show a current last-modified date
      rather than a frozen historical snapshot).
    tables:
      - name: users
        description: One row per customer.
      - name: orders
        description: One row per order header.
        loaded_at_field: created_at
        freshness:
          warn_after: {count: 7, period: day}
          error_after: {count: 30, period: day}
      - name: order_items
        description: One row per order line item.
      - name: products
        description: Product catalog.
      - name: inventory_items
        description: Unit-level inventory, duplicates several product attributes.
      - name: distribution_centers
        description: Fulfillment locations.
      - name: events
        description: Clickstream/session events, linked only to users.
        loaded_at_field: created_at
        freshness:
          warn_after: {count: 7, period: day}
          error_after: {count: 30, period: day}

# A note on the freshness config above: `loaded_at_field` is normally meant
# to measure pipeline lag — how stale data is relative to when it was
# *loaded* into the warehouse. We don't have a real "loaded_at" column here
# and don't control how Google populates this dataset, so we're using
# created_at as a proxy for "is new data still arriving." That answers a
# different (but still useful) question: is this dataset still active, or
# has it stopped growing. The 7/30 day thresholds are a starting guess, not
# something I've validated against this dataset's real update cadence —
# run `dbt source freshness` a few times over a couple of weeks and tighten
# or loosen these once you've seen the actual pattern.