version: 2

# EXPOSURES: documenting who and what consumes the marts layer.
# These aren't enforced by dbt at runtime — they're metadata that
# appears in `dbt docs` as a dependency graph showing "this mart feeds
# this dashboard/tool/team," which becomes important in Module 5 because:
#   1. Before you set up a scheduled job, you need to know WHO is
#      depending on that job completing — exposures make this explicit.
#   2. dbt's --select state:modified+ will include downstream exposures
#      in its graph, so a BI tool that consumes fct_orders appears as
#      "affected" in a Slim CI run that changes fct_orders — making the
#      impact of a change visible before it merges.

exposures:
  - name: revenue_and_margin_dashboard
    label: Revenue & Margin Dashboard
    type: dashboard
    maturity: high
    description: >
      Tracks daily/monthly revenue, margin rate, and AOV by category,
      brand, and acquisition channel. The primary operational dashboard
      for the commercial team. Depends on the daily production job
      completing by 6 AM WAT.
    depends_on:
      - ref('fct_order_items')
      - ref('fct_orders')
      - ref('dim_products')
      - ref('dim_customers')
    owner:
      name: Ebenezer Tomoye
      email: placeholder@domain.com

  - name: customer_ltv_report
    label: Customer LTV Report
    type: analysis
    maturity: medium
    description: >
      Weekly cohort analysis of customer lifetime value by acquisition
      channel and customer segment. Runs as a scheduled report every
      Monday morning.
    depends_on:
      - ref('dim_customers')
      - ref('fct_orders')
    owner:
      name: Ebenezer Tomoye
      email: placeholder@domain.com

  - name: inventory_health_report
    label: Inventory Health Report
    type: analysis
    maturity: medium
    description: >
      Daily view of unsold inventory by category, capital tied up, and
      average days in inventory. Used by the merchandising team for
      markdown/clearance decisions.
    depends_on:
      - ref('fct_inventory')
      - ref('dim_products')
    owner:
      name: Ebenezer Tomoye
      email: placeholder@domain.com

  - name: marketing_channel_dashboard
    label: Marketing Channel Dashboard
    type: dashboard
    maturity: low
    description: >
      Session-to-conversion funnel by traffic source. Connects
      fct_sessions to fct_orders via the heuristic attribution model
      -- documented as such to the marketing team consuming it.
      Maturity is "low" because the underlying attribution join is a
      heuristic (see int_events_to_orders_attribution in-file comment),
      and this dashboard should not be used for major budget decisions
      until a more reliable attribution method is implemented.
    depends_on:
      - ref('fct_sessions')
      - ref('fct_orders')
      - ref('dim_customers')
    owner:
      name: Ebenezer Tomoye
      email: placeholder@domain.com