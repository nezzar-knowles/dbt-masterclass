version: 2

models:
  - name: dim_customers
    description: >
      One row per user — profile, lifetime order/revenue stats, acquisition
      channel, customer segment, and nearest distribution center.
      Answers: who are our customers, how much have they spent, are they
      repeat buyers, where did they come from.
    columns:
      - name: user_id
        data_tests:
          - unique
          - not_null
      - name: customer_segment
        data_tests:
          - accepted_values:
              arguments:
                values: ['never_purchased', 'one_time_customer', 'repeat_customer']

  - name: dim_products
    description: >
      One row per product — catalog attributes, cost, retail price, and
      expected margin. Answers: what do we sell, what's our markup by
      category/brand/department.
    columns:
      - name: product_id
        data_tests:
          - unique
          - not_null

  - name: dim_distribution_centers
    description: >
      One row per fulfillment location. Answers how many distribution centers do we have and where.
    columns:
      - name: distribution_center_id
        data_tests:
          - unique
          - not_null

  - name: fct_orders
    description: >
      One row per order — revenue, fulfillment timing, return flag, holiday
      flag, and best-effort session attribution. Answers: how much revenue
      per order, how fast do we ship/deliver, what's our return rate.
    columns:
      - name: order_id
        data_tests:
          - unique
          - not_null
      - name: user_id
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_customers')
                field: user_id

  - name: fct_order_items
    description: >
      One row per order line item — sale price, cost, margin, distribution
      center. This is the grain to start from for revenue/margin questions,
      since order-level revenue undercounts multi-item orders.
    columns:
      - name: order_item_id
        data_tests:
          - unique
          - not_null
      - name: product_id
        data_tests:
          - relationships:
              arguments:
                to: ref('dim_products')
                field: product_id

  - name: fct_inventory
    description: >
      One row per inventory unit — cost, retail price, sold status, days
      in inventory. Answers: how much stock is unsold, what's our
      tied-up inventory cost.
    columns:
      - name: inventory_item_id
        data_tests:
          - unique
          - not_null

  - name: fct_sessions
    description: >
      One row per browsing session — duration, event count, traffic source,
      conversion flag. Independent of revenue by design; join to
      fct_orders.attributed_session_id only when needed, with the heuristic
      caveat in mind.
    columns:
      - name: session_id
        data_tests:
          - unique
          - not_null
