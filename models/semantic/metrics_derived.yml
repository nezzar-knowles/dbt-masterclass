metrics:
  - name: margin_minus_inventory_capital
    description: >
      Margin earned minus capital currently tied up in unsold inventory —
      a deliberately illustrative derived metric (subtracting two
      differently-scoped numbers) to show students derived metrics can do
      more than simple division, even when the business meaning needs a
      careful caveat: this isn't a true profitability number, since
      inventory capital isn't realized as a cost until sold.
    type: derived
    label: Margin Minus Inventory Capital (illustrative)
    expr: margin - inventory_capital
    input_metrics:
      - name: margin
      - name: inventory_capital

  - name: revenue_per_customer
    description: Total revenue divided by total customer count — a derived metric combining a measure from sem_order_items with one from sem_customers.
    type: derived
    label: Revenue per Customer
    expr: revenue / customers
    input_metrics:
      - name: revenue
      - name: customers
