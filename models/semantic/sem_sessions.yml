semantic_models:
  - name: sem_sessions
    description: >
      One row per browsing session. Use for traffic and conversion
      questions. Independent of revenue by design — see the project README
      on why session-to-revenue attribution is a documented heuristic, not
      a verified join.
    model: ref('fct_sessions')
    defaults:
      agg_time_dimension: session_started_at

    entities:
      - name: session
        type: primary
        expr: session_id
      - name: customer
        type: foreign
        expr: user_id

    dimensions:
      - name: session_started_at
        type: time
        type_params:
          time_granularity: day
        expr: session_started_at
      - name: traffic_source
        type: categorical
      - name: browser
        type: categorical
      - name: converted_in_session
        type: categorical

    measures:
      - name: session_count
        description: Count of sessions.
        agg: count
        expr: session_id
      - name: converted_session_count
        description: Count of sessions that included a purchase event.
        agg: sum
        expr: "case when converted_in_session then 1 else 0 end"
      - name: total_session_events
        description: Sum of event_count across sessions.
        agg: sum
        expr: event_count