metrics:
  - name: revenue
    description: Total revenue, summed across order line items. Use this, not order-level revenue, for any product/category cut.
    type: simple
    label: Revenue
    type_params:
      measure: total_revenue

  - name: margin
    description: Total margin (sale_price - cost), summed across order line items.
    type: simple
    label: Margin
    type_params:
      measure: total_margin

  - name: orders
    description: Count of orders.
    type: simple
    label: Orders
    type_params:
      measure: order_count

  - name: customers
    description: Count of customers.
    type: simple
    label: Customers
    type_params:
      measure: customer_count

  - name: inventory_capital
    description: Total cost of inventory currently on hand.
    type: simple
    label: Inventory Capital
    type_params:
      measure: inventory_cost_total

  - name: sessions
    description: Count of browsing sessions.
    type: simple
    label: Sessions
    type_params:
      measure: session_count

  - name: returned_items
    description: Count of order line items with a returned status. Building block for return_rate.
    type: simple
    label: Returned Items
    type_params:
      measure: returned_item_count

  - name: total_items
    description: Count of all order line items. Building block for return_rate.
    type: simple
    label: Total Items
    type_params:
      measure: order_item_count

  - name: converted_sessions
    description: Count of sessions that included a purchase event. Building block for session_conversion_rate.
    type: simple
    label: Converted Sessions
    type_params:
      measure: converted_session_count
