semantic_models:
  - name: sem_customers
    description: >
      One row per user. Use for customer LTV, segmentation, and
      acquisition-channel questions. Note lifetime_revenue here is computed
      once at the customer grain (see int_users_order_history_rollup) — it
      will NOT exactly match a sum() of sem_order_items.total_revenue
      sliced by customer in every edge case, since the two are built via
      different aggregation paths. Worth a direct callout to students.
    model: ref('dim_customers')
    defaults:
      agg_time_dimension: signed_up_at

    entities:
      - name: customer
        type: primary
        expr: user_id

    dimensions:
      - name: signed_up_at
        type: time
        type_params:
          time_granularity: day
        expr: signup_at
      - name: customer_segment
        type: categorical
      - name: acquisition_channel
        type: categorical
      - name: gender
        type: categorical
      - name: state
        type: categorical
      - name: country
        type: categorical
      - name: nearest_distribution_center_name
        type: categorical

    measures:
      - name: customer_count
        description: Count of customers.
        agg: count
        expr: user_id
      - name: customer_lifetime_revenue
        description: Sum of each customer's lifetime_revenue field.
        agg: sum
        expr: lifetime_revenue
      - name: customers_with_orders
        description: Count of customers who have placed at least one order.
        agg: sum  
        expr: "case when has_ordered then 1 else 0 end"