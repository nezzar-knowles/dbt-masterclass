unit_tests:
  - name: test_inventory_resolved_in_stock_flag
    description: >
      Mocks one sold and one unsold inventory item against a matching
      product row, asserts is_currently_in_stock comes out correctly for
      both. Confirms the join doesn't accidentally invert the flag logic.
    model: int_inventory_resolved
    given:
      - input: ref('stg_thelook__inventory_items')
        rows:
          - {inventory_item_id: 1, product_id: 100, cost: 10.00, created_at: "2026-01-01 00:00:00", sold_at: null}
          - {inventory_item_id: 2, product_id: 100, cost: 10.00, created_at: "2026-01-01 00:00:00", sold_at: "2026-01-05 00:00:00"}
      - input: ref('stg_thelook__products')
        rows:
          - {product_id: 100, product_name: 'Test Shirt', brand: 'TestBrand', category: 'Tops & Tees', department: 'Men', sku: 'ABC123', cost: 10.00, retail_price: 25.00, distribution_center_id: 1}
    expect:
      rows:
        - {inventory_item_id: 1, is_currently_in_stock: true}
        - {inventory_item_id: 2, is_currently_in_stock: false}