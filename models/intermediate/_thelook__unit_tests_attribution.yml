unit_tests:
  - name: test_attribution_respects_24_hour_window
    description: >
      The exact kind of edge case that's painful to find naturally
      occurring in real data but trivial to construct by hand. Mocks one
      session 1 hour before the order (should attribute) and one session
      30 hours before the order (should NOT attribute, falls outside the
      24-hour lookback window).
    model: int_events_to_orders_attribution
    given:
      - input: ref('stg_thelook__orders')
        rows:
          - {order_id: 1, user_id: 1, order_status: 'shipped', gender: 'F', num_of_item: 1, created_at: "2026-01-02 12:00:00", shipped_at: null, delivered_at: null, returned_at: null}
      - input: ref('int_events_sessionized')
        rows:
          - {session_id: 'sess_in_window', user_id: 1, session_started_at: "2026-01-02 11:00:00", session_ended_at: "2026-01-02 11:10:00", event_count: 3, purchase_event_count: 0, entry_uri: '/home', traffic_source: 'email', browser: 'Chrome', session_duration_seconds: 600, converted_in_session: false}
          - {session_id: 'sess_outside_window', user_id: 1, session_started_at: "2026-01-01 06:00:00", session_ended_at: "2026-01-01 06:05:00", event_count: 2, purchase_event_count: 0, entry_uri: '/home', traffic_source: 'facebook', browser: 'Chrome', session_duration_seconds: 300, converted_in_session: false}
    expect:
      rows:
        - {order_id: 1, attributed_session_id: 'sess_in_window', attributed_traffic_source: 'email'}
