version: 2

models:
  - name: int_order_items_joined
    description: Order items joined to products — adds cost alongside sale_price so margin can be calculated at the line-item grain.
    columns:
      - name: order_item_id
        data_tests:
          - unique
          - not_null

  - name: int_orders_pivoted_status_dates
    description: One row per order with lifecycle durations (days_to_ship, days_to_deliver, days_to_fulfill) and a was_returned flag.
    columns:
      - name: order_id
        data_tests:
          - unique
          - not_null

  - name: int_order_items_with_distribution_center
    description: int_order_items_joined extended with distribution center name and coordinates.
    columns:
      - name: order_item_id
        data_tests:
          - unique
          - not_null

  - name: int_users_order_history_rollup
    description: One row per user — first/most recent order date, lifetime order count, lifetime revenue.
    columns:
      - name: user_id
        data_tests:
          - unique
          - not_null

  - name: int_users_first_order_attribution
    description: Every user joined to their first-order outcome, for acquisition-channel-to-revenue analysis.
    columns:
      - name: user_id
        data_tests:
          - unique
          - not_null

  - name: int_inventory_resolved
    description: >
      Resolves the inventory_items/products duplication flagged in Module 2.
      DECISION: products is treated as the source of truth for product
      attributes going forward — see in-file comment for rationale.
    columns:
      - name: inventory_item_id
        data_tests:
          - unique
          - not_null

  - name: int_inventory_aging
    description: Days-in-inventory for currently unsold stock. Null for sold items by design.
    columns:
      - name: inventory_item_id
        data_tests:
          - unique
          - not_null

  - name: int_events_sessionized
    description: events collapsed to one row per session_id — duration, event count, entry uri, conversion flag.
    columns:
      - name: session_id
        data_tests:
          - unique
          - not_null

  - name: int_events_to_orders_attribution
    description: >
      Best-effort attribution of each order to the most recent prior session
      by the same user, within a 24-hour window. This is a heuristic, not a
      verified join — there is no real foreign key between orders and
      events. See in-file comment before presenting results as fact.
    columns:
      - name: order_id
        data_tests:
          - unique
          - not_null

  - name: int_orders_with_holiday_flag
    description: stg_thelook__orders joined against the holiday_calendar seed, flagging orders placed on a holiday/shopping event date.
    columns:
      - name: order_id
        data_tests:
          - unique
          - not_null

  - name: int_users_nearest_distribution_center
    description: >
      One row per user (with non-null lat/long) showing their nearest
      distribution center by great-circle distance, using BigQuery's native
      ST_DISTANCE/ST_GEOGPOINT functions.
    columns:
      - name: user_id
        data_tests:
          - unique
          - not_null